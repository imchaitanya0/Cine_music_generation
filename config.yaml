# CineEmotion Pipeline Configuration
# Optimized for Kaggle T4 (16GB VRAM)

directories:
  data_dir: "../data"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"

hardware:
  device: "cuda"
  fp16: true
  gradient_accumulation_steps: 4

module1_encoder:
  model_name: "microsoft/deberta-v3-base"
  max_length: 128
  batch_size: 16  # Effective BS = 16 * 4 = 64
  learning_rate: 2.0e-5
  weight_decay: 0.01

module2_3_narrative:
  scene_max_utterances: 64
  narrative_max_scenes: 128
  mamba_d_model: 256
  mamba_n_layer: 4
  batch_size: 4
  learning_rate: 1.0e-4

module4_planner:
  hidden_dims: [512, 256, 128]
  dropout: 0.4
  focal_loss_gamma: 2.0
  batch_size: 32
  learning_rate: 3.0e-4
